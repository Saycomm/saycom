<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAYCOM - Детали товара</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-detail-page {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            color: white;
            padding-bottom: 100px;
        }

        .product-detail-flex {
            display: flex;
            gap: 50px;
            flex-wrap: wrap;
        }

        .product-gallery {
            flex: 1;
            min-width: 300px;
        }

        .main-img-container {
            width: 100%;
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(252, 85, 88, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .main-img-container img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }

        .thumb-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .thumb {
            width: 80px;
            height: 80px;
            background: #fff;
            padding: 5px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
            object-fit: contain;
        }

        .thumb.active {
            border-color: #fc5558;
        }

        .product-info {
            flex: 1;
            min-width: 300px;
        }

        .product-info h1 {
            font-size: 32px;
            margin-bottom: 15px;
            color: white;
        }

        .product-price-detail {
            font-size: 28px;
            color: #fc5558;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .detail-actions {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .btn-order-large {
            background: #fc5558;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
        }

        .btn-order-large:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(252, 85, 88, 0.3);
        }

        /* Tabs */
        .tabs-header {
            display: flex;
            gap: 30px;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
            margin-top: 50px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 16px;
            padding: 15px 0;
            cursor: pointer;
            position: relative;
            font-weight: 500;
        }

        .tab-btn.active {
            color: #fc5558;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #fc5558;
        }

        .tab-content {
            display: none;
            line-height: 1.8;
            color: #ccc;
            font-size: 16px;
        }

        .tab-content.active {
            display: block;
        }

        .specs-table {
            width: 100%;
            border-collapse: collapse;
        }

        .specs-table tr {
            border-bottom: 1px solid #222;
        }

        .specs-table td {
            padding: 15px 10px;
        }

        .specs-table td:first-child {
            color: #888;
            width: 40%;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 20px;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        @media screen and (max-width: 768px) {
            .product-detail-page {
                margin: 20px auto;
                padding: 0 15px;
            }

            .product-detail-flex {
                flex-direction: column;
                gap: 15px;
            }

            .main-img-container {
                padding: 15px;
                border-radius: 15px;
                margin-bottom: 10px;
            }

            .main-img-container img {
                max-height: 220px;
            }

            .thumb {
                width: 60px;
                height: 60px;
            }

            .product-info h1 {
                font-size: 22px;
                line-height: 1.2;
            }

            .product-price-detail {
                font-size: 24px;
                margin-bottom: 20px;
            }

            .detail-actions {
                flex-direction: column;
                gap: 12px;
            }

            .btn-order-large {
                padding: 12px 20px;
                font-size: 16px;
            }

            .tabs-header {
                gap: 20px;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                padding-bottom: 5px;
            }

            .tab-btn {
                white-space: nowrap;
                font-size: 14px;
            }

            .tab-content {
                font-size: 15px;
            }

            .specs-table td {
                padding: 10px 5px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <img src="assets/img/main-logo.png" class="main-logo" alt="Saycom Logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
        <div class="search-container">
            <i class='bx bx-search'></i>
            <input type="text" id="main-search-input" placeholder="Поиск товаров (например: камеры, кондиционеры)...">
        </div>
        <ul class="header-actions">
            <li onclick="window.location.href='hert.html'">Избранное <i class='bx bxs-heart' style="color:#fc5558;"></i></li>
            <li onclick="window.location.href='cart.html'">Корзина <i class='bx bxs-cart' style="color:#fc5558;"></i></li>
            <li onclick="window.location.href='orders.html'">Мои Заказы <i class='bx bx-package' style="color:#fc5558;"></i></li>
        </ul>
    </div>

    <div class="nav-container">
        <ul class="main-menus">
            <li onclick="window.location.href='index.html'">Главная</li>
            <li onclick="window.location.href='category.html'">Категория</li>
            <li onclick="window.location.href='all_product.html'">Товары</li>
            <li onclick="window.location.href='installers.html'">Установщики</li>
            <li onclick="window.location.href='about.html'">О нас</li>
            <li onclick="window.location.href='contacts.html'">Контакты</li>
        </ul>
    </div>

    <div class="product-detail-page" id="product-detail-content">
        <!-- Dynamic content will be loaded here -->
        <div style="text-align: center; padding: 100px;">
            <i class='bx bx-loader-alt bx-spin' style="font-size: 50px; color: #fc5558;"></i>
            <p>Загрузка характеристик товара...</p>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-menu">
            <div class="main-footer">
                <div class="contacts">
                    <i class='bx bxl-whatsapp'></i>
                    <i class='bx bxl-telegram'></i>
                    <i class='bx bxl-instagram'></i>
                    <i class='bx bxl-tiktok'></i>
                </div>
                <div class="adress">
                    <p>Адрес: г. Шымкент (Работаем по всему РК)</p>
                    <p>Email:saycommap@gmail.com</p>
                    <p onclick="window.location.href='tel:+77752816666'">Phone:+7(775)-281-6666</p>
                </div>
            </div>
        </div>
        <p class="copyright">© 2024 Saycom Company. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
    <script>
        // Specific logic for product detail page
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!productId) {
                document.getElementById('product-detail-content').innerHTML = `
                    <div style="text-align: center; padding: 50px;">
                        <h2>Товар не найден</h2>
                        <button onclick="window.location.href='all_product.html'" class="btn-order-large">Вернуться в магазин</button>
                    </div>
                `;
                return;
            }

            // Wait until script.js loads allProductsData
            const checkData = setInterval(() => {
                if (window.allProductsData && window.allProductsData.length > 0) {
                    clearInterval(checkData);
                    renderProductDetail(productId);
                }
            }, 100);
        });

        function renderProductDetail(id) {
            const product = window.allProductsData.find(p => String(p.id) === String(id));
            if (!product) return;

            const content = document.getElementById('product-detail-content');
            
            content.innerHTML = `
                <div class="product-detail-flex">
                    <div class="product-gallery">
                        <div class="main-img-container">
                            <img id="main-view" src="${product.img}" alt="${product.name}">
                        </div>
                        <div class="thumb-container">
                            ${(product.gallery || [product.img]).map((img, i) => `
                                <img src="${img}" class="thumb ${i === 0 ? 'active' : ''}" onclick="updateGallery(this, '${img}')">
                            `).join('')}
                        </div>
                    </div>
                    <div class="product-info">
                        <h1>${product.name}</h1>
                        <div class="product-price-detail">${product.price}</div>
                        <p style="margin-bottom: 30px; opacity: 0.8;">${product.desc}</p>
                        
                        <div class="detail-actions">
                            <button class="btn-order-large" onclick="orderNow('${product.id}')">Купить сейчас</button>
                            <button class="btn-order-large" style="background:#222; border:1px solid #444;" onclick="toggleCart('${product.id}')">В корзину</button>
                        </div>

                        <div style="display: flex; gap: 20px; align-items: center;">
                            <span style="font-size: 14px; color: #888;">Поделиться:</span>
                            <i class='bx bxl-whatsapp' style="font-size: 24px; cursor: pointer;"></i>
                            <i class='bx bxl-telegram' style="font-size: 24px; cursor: pointer;"></i>
                        </div>
                    </div>
                </div>

                <div class="tabs-header">
                    <button class="tab-btn active" onclick="switchTab(this, 'desc')">Описание</button>
                    <button class="tab-btn" onclick="switchTab(this, 'specs')">Характеристики</button>
                    <button class="tab-btn" onclick="switchTab(this, 'video')">Видео обзор</button>
                </div>

                <div id="desc-tab" class="tab-content active">
                    <p>${product.full_desc || 'Подробное описание данного товара скоро появится. Мы гарантируем высокое качество и надежность всей нашей продукции.'}</p>
                </div>

                <div id="specs-tab" class="tab-content">
                    <table class="specs-table">
                        ${(product.specs || []).map(s => `
                            <tr>
                                <td>${s.key}</td>
                                <td>${s.value}</td>
                            </tr>
                        `).join('') || '<tr><td colspan="2">Характеристики уточняются у менеджера</td></tr>'}
                    </table>
                </div>

                <div id="video-tab" class="tab-content">
                    <div class="video-container">
                        <iframe src="${product.video || 'https://www.youtube.com/embed/dQw4w9WgXcQ'}" frameborder="0" allowfullscreen></iframe>
                    </div>
                </div>
            `;
        }

        function updateGallery(el, src) {
            document.getElementById('main-view').src = src;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        function switchTab(el, tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(tabId + '-tab').classList.add('active');
        }
    </script>
</body>
</html>
